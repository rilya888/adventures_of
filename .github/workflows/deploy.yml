# Deploy to Railway on push to main.
# Required: Add RAILWAY_TOKEN to GitHub repo Secrets (Settings > Secrets > Actions).
# Create token in Railway: Project > Settings > Tokens > Generate.

name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy web
        run: railway up --detach --no-gitignore -s web

      - name: Deploy worker
        run: railway up --detach --no-gitignore -s worker
